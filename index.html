<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관심종목 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --dim:      #484f58;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --green-bg: #122a1a;
      --green-bd: #238636;
      --red:      #f85149;
      --red-bg:   #3b1219;
      --red-bd:   #da3633;
      --purple:   #d2a8ff;
      --yellow:   #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--blue); letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 8px; }

    /* ── BUTTONS ── */
    .btn {
      padding: 5px 13px; border-radius: 6px; border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-green  { background: var(--green-bd); border-color: var(--green-bd); color: #fff; }
    .btn-green:hover { background: #2ea043; }
    .btn-ghost  { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }
    .btn-icon   { padding: 4px 7px; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 4px; font-size: 14px; }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* ── MAIN ── */
    .main { padding: 18px 24px 40px; max-width: 1700px; margin: 0 auto; }

    /* ── SECTOR PANEL ── */
    .sector-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      transition: border-color .15s;
    }
    .sector-panel.sortable-ghost { opacity: .4; }
    .sector-panel.sortable-chosen { border-color: var(--blue); }

    .sector-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .sector-head.is-collapsed { border-bottom: none; }

    .drag-handle {
      color: var(--dim); cursor: grab; font-size: 16px; padding: 0 2px; flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }

    /* Row drag handle (종목 순서 변경) */
    .row-drag-handle {
      color: var(--dim); cursor: grab; font-size: 13px; text-align: center;
      width: 20px; padding: 0 2px; opacity: 0.35; transition: opacity .15s; user-select: none;
    }
    .row-drag-handle:hover { opacity: 1; }
    .row-drag-handle:active { cursor: grabbing; }
    tr:hover .row-drag-handle { opacity: 0.65; }

    /* Editable cell hint */
    .editable-hint { cursor: pointer; border-radius: 3px; }
    .editable-hint:hover { background: var(--surface2); }
    .inline-edit-input {
      background: var(--bg); border: 1px solid var(--blue); color: var(--text);
      padding: 2px 6px; border-radius: 4px; font-size: inherit; font-family: inherit;
      outline: none;
    }

    .sector-name-wrap { flex: 1; min-width: 0; }
    .sector-name-text {
      font-weight: 600; font-size: 14px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sector-name-text:hover { color: var(--blue); }

    .sector-name-input {
      background: var(--bg); border: 1px solid var(--blue);
      color: var(--text); padding: 2px 8px; border-radius: 4px;
      font-size: 14px; font-weight: 600; width: 260px;
    }
    .sector-name-input:focus { outline: none; }

    .badge {
      font-size: 10px; padding: 1px 7px; border-radius: 10px;
      background: var(--surface2); color: var(--muted); flex-shrink: 0;
    }

    .sector-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
    .collapse-icon { font-size: 12px; transition: transform .2s; }
    .is-collapsed .collapse-icon { transform: rotate(-90deg); }

    /* ── TABLE ── */
    .sector-body { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface2); color: var(--muted);
      font-weight: 500; font-size: 11px; text-align: left;
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border2); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }

    .code-cell  { font-family: monospace; font-size: 11px; color: var(--muted); }
    .name-cell  { font-weight: 500; white-space: nowrap; }
    .mkt-badge  {
      display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 5px;
    }
    .mkt-KR  { background: #1a3a5c; color: var(--blue); }
    .mkt-KQ  { background: #1a3547; color: #79c0ff; }
    .mkt-US  { background: #2b1f40; color: var(--purple); }

    /* 인라인 마켓 드롭다운 */
    .mkt-inline-select {
      font-size: 10px; font-weight: 600; padding: 2px 4px;
      border-radius: 4px; border: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      outline: none; text-align: center;
    }
    .mkt-inline-select.mkt-KR { background: #1a3a5c; color: var(--blue); }
    .mkt-inline-select.mkt-KQ { background: #1a3547; color: #79c0ff; }
    .mkt-inline-select.mkt-US { background: #2b1f40; color: var(--purple); }
    .mkt-inline-select option  { background: var(--surface2); color: var(--text); }

    .price-cell { font-weight: 600; white-space: nowrap; }
    .pct-cell   { font-weight: 600; white-space: nowrap; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--muted); }

    /* RSI badge */
    .rsi-cell { font-weight: 700; font-size: 12px; white-space: nowrap; }
    .rsi-hot  { color: #f85149; }   /* >70 과매수 */
    .rsi-cold { color: #3fb950; }   /* <30 과매도 */
    .rsi-mid  { color: var(--text); }

    /* Growth estimate cells */
    .growth-cell { font-size: 11px; font-weight: 600; white-space: nowrap; text-align: right; }
    .growth-na   { color: var(--dim); font-weight: 400; }

    /* SMA badge */
    .sma-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .sma-above { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
    .sma-below { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd);   }
    .sma-none  { background: var(--surface2); color: var(--dim);   border: 1px solid var(--border2);  }

    /* Sparkline */
    .spark-cell svg { display: block; }

    /* Editable notes */
    .note-cell {
      min-width: 130px; max-width: 200px; font-size: 11px;
      color: var(--muted); line-height: 1.5; cursor: pointer; border-radius: 3px; padding: 2px 4px;
    }
    .note-cell:hover { background: var(--surface2); color: var(--text); }
    .note-cell.empty::before { content: '클릭하여 입력'; color: var(--dim); font-style: italic; }
    .note-cell textarea {
      width: 180px; min-height: 56px;
      background: var(--bg); border: 1px solid var(--blue);
      color: var(--text); padding: 4px 8px; border-radius: 4px;
      font-size: 11px; resize: vertical; font-family: inherit; line-height: 1.5;
    }
    .note-cell textarea:focus { outline: none; }

    /* Status */
    .status-icon { font-size: 13px; }
    .spin { animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Add stock form row */
    .add-row td {
      background: var(--bg); padding: 8px 12px;
      border-top: 1px solid var(--border);
    }
    .add-form {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .add-input, .add-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px;
    }
    .add-input:focus, .add-select:focus { outline: none; border-color: var(--blue); }

    /* Add sector bottom */
    .add-sector-btn {
      width: 100%; margin-top: 8px; padding: 11px;
      background: transparent; border: 2px dashed var(--border);
      color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 13px;
      transition: all .15s;
    }
    .add-sector-btn:hover { border-color: var(--blue); color: var(--blue); background: #58a6ff0d; }

    /* Empty sector */
    .empty-row td { text-align: center; padding: 16px; color: var(--dim); font-size: 12px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      padding: 9px 16px; border-radius: 6px; font-size: 12px; font-weight: 500;
      z-index: 9999; animation: fadeUp .25s ease;
    }
    .toast-ok  { background: var(--green-bd); color: #fff; }
    .toast-err { background: var(--red-bd);   color: #fff; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">📊 관심종목 대시보드</div>
    </div>
    <div class="header-sub" id="last-updated">업데이트: -</div>
  </div>
  <div class="header-right">
    <span id="refresh-status" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-ghost" onclick="refreshAll()">🔄 전체 새로고침</button>
    <button class="btn btn-green" onclick="addSector()">＋ 섹터 추가</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="sectors-container"></div>
  <button class="add-sector-btn" onclick="addSector()">＋ 새 섹터 추가</button>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let db = { sectors: [] };
const PROXIES = [
  // 1순위: Netlify 함수 (GitHub + Netlify 배포 시 작동, 가장 안정적)
  url => `/.netlify/functions/proxy?url=${encodeURIComponent(url)}`,
  // 2순위: 무료 공개 프록시 (백업)
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
function save() { localStorage.setItem('wl_v2', JSON.stringify(db)); }

function load() {
  const raw = localStorage.getItem('wl_v2');
  if (raw) { db = JSON.parse(raw); return; }
  // 샘플 데이터
  db = { sectors: [
    { id: uid(), name: '스테이블코인 / 크립토', collapsed: false, stocks: [
      { id: uid(), code: '234340', market: 'KR', name: '헥토파이낸셜', features: '글로벌 결제망, 서클 파트너사', issues: '디지털자산 입법 지연으로 하락', pd: null },
      { id: uid(), code: '124500', market: 'KR', name: '아이티센글로벌', features: '금 기반 스테이블코인 (금가격 영향)', issues: '금가격 하락으로 최근 주가 하락', pd: null },
      { id: uid(), code: '041190', market: 'KR', name: '우리기술투자', features: '두나무 지분 7% 보유', issues: '', pd: null },
      { id: uid(), code: '003530', market: 'KR', name: '한화투자증권', features: '두나무 지분 6% 보유', issues: '', pd: null },
    ]},
    { id: uid(), name: '미국 빅테크', collapsed: false, stocks: [
      { id: uid(), code: 'AAPL', market: 'US', name: 'Apple', features: '아이폰 / 서비스 매출 성장', issues: '', pd: null },
      { id: uid(), code: 'NVDA', market: 'US', name: 'NVIDIA', features: 'AI 반도체 1위', issues: '', pd: null },
    ]},
  ]};
  save();
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function uid() { return '_' + Math.random().toString(36).slice(2, 9); }

function ticker(code, market) {
  if (market === 'US') return code.toUpperCase();
  if (market === 'KQ') return code + '.KQ';
  return code + '.KS'; // KR default
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return { text: '-', cls: 'neu' };
  const t = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  return { text: t, cls: v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu' };
}

function fmtPrice(v, cur) {
  if (v == null) return '-';
  if (cur === 'KRW') return Math.round(v).toLocaleString('ko-KR') + '원';
  return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function toast(msg, ok = true) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ═══════════════════════════════════════════
//  SPARKLINE SVG
// ═══════════════════════════════════════════
function sparkSVG(prices, w = 100, h = 36) {
  const valid = (prices || []).filter(p => p != null && !isNaN(p));
  if (valid.length < 2) return `<svg width="${w}" height="${h}"><text x="6" y="20" fill="#484f58" font-size="10">-</text></svg>`;
  const min = Math.min(...valid), max = Math.max(...valid);
  const range = max - min || 1;
  const pad = 3;
  const pts = valid.map((p, i) => {
    const x = pad + (i / (valid.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (p - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const up = valid[valid.length - 1] >= valid[0];
  const col = up ? '#3fb950' : '#f85149';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6"
      stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ═══════════════════════════════════════════
//  RSI CALCULATION
// ═══════════════════════════════════════════
function calcRSI(closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  const changes = closes.slice(1).map((c, i) => c - closes[i]);
  const gains   = changes.map(c => Math.max(0,  c));
  const losses  = changes.map(c => Math.max(0, -c));
  let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
  let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < changes.length; i++) {
    avgGain = (avgGain * (period - 1) + gains[i]) / period;
    avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
  }
  if (avgLoss === 0) return 100;
  return 100 - (100 / (1 + avgGain / avgLoss));
}

// ═══════════════════════════════════════════
//  YAHOO FINANCE FETCH
// ═══════════════════════════════════════════
async function fetchYahoo(tk) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${tk}?interval=1d&range=1y&includePrePost=false`;

  // 1) 직접 호출 시도
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      const json = await res.json();
      if (json?.chart?.result?.[0]) return json;
    }
  } catch {}

  // 2) 프록시 순차 시도
  for (const proxyFn of PROXIES) {
    try {
      const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(8000) });
      if (res.ok) {
        const json = await res.json();
        if (json?.chart?.result?.[0]) return json;
      }
    } catch {}
  }

  throw new Error(`${tk} — 데이터를 가져올 수 없습니다. 잠시 후 다시 시도해 주세요.`);
}

async function fetchGrowthData(tk) {
  const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${tk}?modules=earningsTrend`;
  let json = null;
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (res.ok) json = await res.json();
  } catch {}
  if (!json?.quoteSummary?.result?.[0]) {
    for (const proxyFn of PROXIES) {
      try {
        const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const j = await res.json();
          if (j?.quoteSummary?.result?.[0]) { json = j; break; }
        }
      } catch {}
    }
  }
  const trends = json?.quoteSummary?.result?.[0]?.earningsTrend?.trend || [];
  const getG = (period) => {
    const t = trends.find(x => x.period === period);
    return {
      rev:    t?.revenueEstimate?.growth?.raw    ?? null, // Revenue YoY Sot'll
      eps:    t?.earningsEstimate?.growth?.raw   ?? null, // EPS YoY Sot'll
      epsNow: t?.earningsEstimate?.avg?.raw      ?? null, // ì¼ë ê³¼è ë©ì¼ë ìº ìì 
      epsAgo: t?.earningsEstimate?.yearAgoEps?.raw ?? null, // ì ë ë¨ê¸° EPS
    };
  };
  return { nextQ: getG('+1q'), curY: getG('0y') };
}

async function loadStockData(code, market) {
  const tk = ticker(code, market);
  const json = await fetchYahoo(tk);
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('데이터 없음');

  const meta = result.meta;
  const timestamps = result.timestamp || [];
  const closes = result.indicators?.quote?.[0]?.close || [];
  // 수정주가(adjclose) 우선 사용 — 주식분할/배당 이벤트 발생 시에도 일관된 스케일 유지
  const adjCloses = result.indicators?.adjclose?.[0]?.adjclose || [];
  const priceArr = adjCloses.length > 0 ? adjCloses : closes;

  // 유효한 (타임스탬프, 종가) 쌍만 추출
  const validPairs = timestamps.map((t, i) => [t, priceArr[i]]).filter(([, c]) => c != null && !isNaN(c));
  const validCloses = validPairs.map(([, c]) => c);
  if (validCloses.length === 0) throw new Error('가격 데이터 없음');

  const n = validCloses.length;
  const cur = meta.regularMarketPrice ?? validCloses[n - 1];
  const currency = meta.currency ?? 'USD';

    // ── 1D% (전일 종가 기준) ──────────────────────────────────────
  // Yahoo v8 range=5d 는 장중에 오늘 데이터를 중복 포함 (6개 행) →
  // validCloses[n-2] == validCloses[n-1] 이 되어 0% 오류 발생.
  // 타임스탬프 기준으로 날짜별 그룹핑 후 전일(마지막-1 날짜) 종가를 추출.
  const _dateMap = {};
  for (const [t, c] of validPairs) {
    const dk = new Date(t * 1000).toISOString().slice(0, 10); // UTC YYYY-MM-DD
    _dateMap[dk] = c; // 같은 날짜면 마지막(최신) 값으로 덮어쓰기
  }
  const _sortedDates  = Object.keys(_dateMap).sort();
  const prevDayClose  = _sortedDates.length > 1
    ? _dateMap[_sortedDates[_sortedDates.length - 2]] : null;

  let d1pct;
  const metaPct   = meta.regularMarketChangePercent;
  const prevClose = meta.previousClose;          // 실제 전일 종가 (일부 거래소 제공)
  const curPrice  = meta.regularMarketPrice;     // 현재ga (비조정)
  if (prevClose && curPrice && prevClose > 0) {
    // meta.previousClose 우선 (KRX 등 일부 거래소에서 제공)
    d1pct = ((curPrice - prevClose) / prevClose) * 100;
  } else if (prevDayClose && curPrice && prevDayClose > 0) {
    // 날짜 그룹핑으로 추출한 전일 종가 (Yahoo US 주식 — previousClose 미제공 시)
    d1pct = ((curPrice - prevDayClose) / prevDayClose) * 100;
  } else if (metaPct != null && !isNaN(metaPct) && metaPct !== 0) {
    d1pct = metaPct;
  } else {
    d1pct = 0;
  }

  // ── 1M% (≈22 거래일 전 대비) ─────────────────────────────────────────
  const price1M = validCloses[Math.max(0, n - 22)];
  const d1Mpct = ((validCloses[n - 1] - price1M) / price1M) * 100;

  // ── YTD% (연초 첫 거래일 대비) ──────────────────────────────────────
  const yearStart = new Date(new Date().getFullYear(), 0, 1).getTime() / 1000;
  let ytdPrice = validCloses[0];
  for (const [t, c] of validPairs) {
    if (t >= yearStart) { ytdPrice = c; break; }
  }
  const ytdPct = ((validCloses[n - 1] - ytdPrice) / ytdPrice) * 100;

  // ── SMA50 ─────────────────────────────────────────────────────────────
  const last50 = validCloses.slice(-50);
  const sma50 = last50.length >= 10 ? last50.reduce((a, b) => a + b, 0) / last50.length : null;
  // adjclose 스케일로 비교
  const aboveSMA50 = sma50 != null ? validCloses[n - 1] > sma50 : null;

  // ── 30일 스파이크 ─────────────────────────────────────────────────────
  const spark = validCloses.slice(-30);

  // ── RSI(14) ───────────────────────────────────────────────────────────
  const rsi = calcRSI(validCloses);

  const stockName = meta.longName || meta.shortName || null;

  // ── 성장률 추정치 (Yahoo earningsTrend) ──────────────────────────────
  let growth = { nextQ: { rev: null, eps: null }, curY: { rev: null, eps: null } };
  try { growth = await fetchGrowthData(tk); } catch {}

  return { cur, currency, d1pct, d1Mpct, ytdPct, aboveSMA50, sma50, spark, rsi, growth, stockName, updatedAt: new Date().toISOString() };
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  const container = document.getElementById('sectors-container');
  container.innerHTML = '';
  db.sectors.forEach(sec => container.appendChild(buildPanel(sec)));
  initSortable(container);
  updateLastUpdated();
}

function buildPanel(sec) {
  const panel = document.createElement('div');
  panel.className = 'sector-panel';
  panel.dataset.id = sec.id;

  // HEAD
  const head = document.createElement('div');
  head.className = 'sector-head' + (sec.collapsed ? ' is-collapsed' : '');

  head.innerHTML = `
    <span class="drag-handle" title="드래그하여 순서 변경">⠿</span>
    <div class="sector-name-wrap">
      <span class="sector-name-text" ondblclick="renameSector('${sec.id}', this)" title="더블클릭하여 이름 변경">${sec.name}</span>
    </div>
    <span class="badge">${sec.stocks.length}종목</span>
    <div class="sector-actions">
      <button class="btn btn-ghost" style="font-size:11px;padding:3px 9px" onclick="toggleAddForm('${sec.id}')">＋ 종목</button>
      <button class="btn-icon" onclick="refreshSector('${sec.id}')" title="섹터 새로고침">🔄</button>
      <button class="btn-icon" onclick="deleteSector('${sec.id}')" title="섹터 삭제" style="color:var(--red)">🗑</button>
      <button class="btn-icon" onclick="toggleCollapse('${sec.id}')" title="접기/펼치기">
        <span class="collapse-icon">▾</span>
      </button>
    </div>`;

  head.querySelector('.collapse-icon').style.transform = sec.collapsed ? 'rotate(-90deg)' : '';
  panel.appendChild(head);

  if (!sec.collapsed) {
    const body = document.createElement('div');
    body.className = 'sector-body';
    body.id = 'body-' + sec.id;

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      <th style="width:20px;padding:4px"></th>
      <th>코드</th>
      <th>마켓</th>
      <th>종목명</th>
      <th>현재가</th>
      <th>1D %</th>
      <th>1M %</th>
      <th>YTD %</th>
      <th>MA50</th>
      <th title="RSI(14) — 70↑ 과매수 · 30↓ 과매도">RSI</th>
      <th style="min-width:108px">30일 스파이크</th>
      <th title="다음 분기 매출 YoY 성장률 추정치" style="min-width:68px">다음Q<br>매출%</th>
      <th title="다음 분기 EPS YoY 성장률 추정치" style="min-width:68px">다음Q<br>EPS%</th>
      <th title="올해 매출 YoY 성장률 추정치" style="min-width:68px">올해<br>매출%</th>
      <th title="올해 EPS YoY 성장률 추정치" style="min-width:68px">올해<br>EPS%</th>
      <th>특징</th>
      <th>주요이슈</th>
      <th></th>
    </tr></thead>`;

    const tbody = document.createElement('tbody');
    tbody.id = 'tbody-' + sec.id;

    if (sec.stocks.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="18">종목을 추가해 주세요</td></tr>`;
    } else {
      sec.stocks.forEach(st => tbody.appendChild(buildRow(sec.id, st)));
      initSortableRows(tbody, sec);
    }

    table.appendChild(tbody);
    body.appendChild(table);

    // Add stock form row
    const addRow = document.createElement('div');
    addRow.id = 'addform-' + sec.id;
    addRow.style.display = 'none';
    addRow.style.padding = '10px 14px';
    addRow.style.borderTop = '1px solid var(--border(';
    addRow.style.background = 'var(--bg)';
    addRow.innerHTML = `
      <div class="add-form">
        <input class="add-input" id="code-${sec.id}" placeholder="종목코드 (예: 005930, AAPL)" style="width:220px"/>
        <select class="add-select" id="mkt-${sec.id}">
          <option value="KR">🇰🇷 KR (코스피)</option>
          <option value="KQ">🇰🇷 KQ (코스닥)</option>
          <option value="US">🇺🇸 US (미국)</option>
        </select>
        <button class="btn btn-green" onclick="addStock('${sec.id}')">추가</button>
        <button class="btn btn-ghost" onclick="toggleAddForm('${sec.id}')">취셬</button>
        <span id="add-status-${sec.id}" style="font-size:11px;color:var(--muted)"></span>
      </div>`;
    body.appendChild(addRow);
    panel.appendChild(body);
  }

  return panel;
}

function buildRow(sectorId, st) {
  const tr = document.createElement('tr');
  tr.id = 'row-' + st.id;
  tr.dataset.stockId = st.id;
  tr.dataset.sectorId = sectorId;

  const pd = st.pd;
  const priceTxt = pd ? fmtPrice(pd.cur, pd.currency) : '-';
  const d1 = pd ? fmtPct(pd.d1pct) : { text: '-', cls: 'neu' };
  const d1M = pd ? fmtPct(pd.d1Mpct) : { text: '-', cls: 'neu' };
  const ytd = pd ? fmtPct(pd.ytdPct) : { text: '-', cls: 'neu' };

  let smaBadge = `<span class="sma-badge sma-none">-</span>`;
  if (pd && pd.aboveSMA50 !== null) {
    smaBadge = pd.aboveSMA50
      ? `<span class="sma-badge sma-above">▲ MA50 위</span>`
      : `<span class="sma-badge sma-below">▼ MA50 아래</span>`;
  }

  // RSI
  let rsiHtml = `<span class="rsi-cell neu">-</span>`;
  if (pd && pd.rsi != null) {
    const rv = pd.rsi;
    const rcls = rv >= 70 ? 'rsi-hot' : rv <= 30 ? 'rsi-cold' : 'rsi-mid';
    rsiHtml = `<span class="rsi-cell ${rcls}">${rv.toFixed(1)}</span>`;
  }

  // Growth helpers
  const fmtG = (v) => {
    if (v == null) return `<span class="growth-cell growth-na">-</span>`;
    const pct = (v * 100).toFixed(1);
    const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
    return `<span class="growth-cell ${cls}">${v >= 0 ? '+' : ''}${pct}%</span>`;
  };
  const fmtEps = (v, epsNow, epsAgo) => {
    if (v == null && epsNow == null) return `<span class="growth-cell growth-na">-</span>`;
    if (epsAgo != null && epsNow != null) {
      if (epsAgo < 0 && epsNow > 0) return `<span class="growth-cell pos">흑자전환</span>`;
      if (epsAgo > 0 && epsNow < 0) return `<span class="growth-cell neg">적자전환</span>`;
      if (epsAgo < 0 && epsNow < 0) return `<span class="growth-cell neg">적자지속</span>`;
    }
    if (v == null) return `<span class="growth-cell growth-na">-</span>`;
    const pct = (v * 100).toFixed(1);
    const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
    return `<span class="growth-cell ${cls}">${v >= 0 ? '+' : ''}${pct}%</span>`;
  };
  const g = pd?.growth || {};
  const nqRev = fmtG(g.nextQ?.rev ?? null);
  const nqEps = fmtEps(g.nextQ?.eps ?? null, g.nextQ?.epsNow ?? null, g.nextQ?.epsAgo ?? null);
  const cyRev = fmtG(g.curY?.rev ?? null);
  const cyEps = fmtEps(g.curY?.eps ?? null, g.curY?.epsNow ?? null, g.curY?.epsAgo ?? null);

  const spark = pd && pd.spark ? sparkSVG(pd.spark) : sparkSVG(null);
  tr.innerHTML = `
    <td class="row-drag-handle" title="드래그로 순서 변경">⠿</td>
    <td class="code-cell editable-hint" ondblclick="editStockCode(this,'${sectorId}','${st.id}')" title="더블클릭으로 코드 수정">${st.code}</td>
    <td style="white-space:nowrap">
      <select class="mkt-inline-select mkt-${st.market}" onchange="changeMarket('${sectorId}','${st.id}',this.value)" title="마켓 변경 후 자동 새로고침">
        <option value="KR" ${st.market==='KR'?'selected':''}>🇰🇷 KR</option>
        <option value="KQ" ${st.market==='KQ'?'selected':''}>🇰🇷 KQ</option>
        <option value="US" ${st.market==='US'?'selected':''}>🇺🇸 US</option>
      </select>
    </td>
    <td class="name-cell editable-hint" ondblclick="editStockField(this,'${sectorId}','${st.id}','name')" title="더블클릭으로 종목명 수정">${st.name}</td>
    <td class="price-cell">${priceTxt}</td>
    <td class="pct-cell ${d1.cls}">${d1.text}</td>
    <td class="pct-cell ${d1M.cls}">${d1M.text}</td>
    <td class="pct-cell ${ytd.cls}">${ytd.text}</td>
    <td>${smaBadge}</td>
    <td style="text-align:right">${rsiHtml}</td>
    <td class="spark-cell">${spark}</td>
    <td style="text-align:right">${nqRev}</td>
    <td style="text-align:right">${nqEps}</td>
    <td style="text-align:right">${cyRev}</td>
    <td style="text-align:right">${cyEps}</td>
    <td><div class="note-cell ${st.features ? '' : 'empty'}"
          onclick="editNote(this, '${sectorId}', '${st.id}', 'features')">${st.features || ''}</div></td>
    <td><div class="note-cell ${st.issues ? '' : 'empty'}"
          onclick="editNote(this, '${sectorId}', '${st.id}', 'issues')">${st.issues || ''}</div></td>
    <td>
      <span style="display:flex;gap:3px;align-items:center">
        <button class="btn-icon" title="새로고침" onclick="refreshStock('${sectorId}','${st.id}')">🔄</button>
        <button class="btn-icon" title="삭제" style="color:var(--red)" onclick="deleteStock('${sectorId}','${st.id}')">✕</button>
      </span>
    </td>`;
  return tr;
}

// ═══════════════════════════════════════════
//  INLINE NOTE EDIT
// ═══════════════════════════════════════════
function editNote(el, sectorId, stockId, field) {
  if (el.querySelector('textarea')) return;
  const sec = db.sectors.find(s => s.id === sectorId);
  const st = sec?.stocks.find(s => s.id === stockId);
  if (!st) return;
  const cur = st[field] || '';
  const ta = document.createElement('textarea');
  ta.value = cur;
  el.innerHTML = '';
  el.appendChild(ta);
  el.classList.remove('empty');
  ta.focus();
  ta.addEventListener('blur', () => {
    const val = ta.value.trim();
    st[field] = val;
    save();
    el.innerHTML = val || '';
    el.classList.toggle('empty', !val);
  });
  ta.addEventListener('keydown', e => { if (e.key === 'Escape') ta.blur(); });
}

// ═══════════════════════════════════════════
//  REFRESH
// ═══════════════════════════════════════════
async function refreshStock(sectorId, stockId) {
  const sec = db.sectors.find(s => s.id === sectorId);
  const st = sec?.stocks.find(s => s.id === stockId);
  if (!st) return;

  const row = document.getElementById('row-' + stockId);
  if (row) {
    const cells = row.querySelectorAll('td');
    cells[2].innerHTML = '<span class="spin">⟳</span>';
  }

  try {
    st.pd = await loadStockData(st.code, st.market);
    save();
    const newRow = buildRow(sectorId, st);
    if (row) row.replaceWith(newRow);
    updateLastUpdated();
  } catch (e) {
    if (row) row.querySelectorAll('td')[2].textContent = '오류';
    toast('데이터 로드 실패: ' + st.code, false);
  }
}

async function refreshSector(sectorId) {
  const sec = db.sectors.find(s => s.id === sectorId);
  if (!sec) return;
  setStatus(`${sec.name} 업데이트 중...`);
  for (const st of sec.stocks) await refreshStock(sectorId, st.id);
  setStatus('');
  toast(`${sec.name} 업데이트 완료`);
}

async function refreshAll() {
  setStatus('전체 업데이트 중...');
  for (const sec of db.sectors) {
    for (const st of sec.stocks) await refreshStock(sec.id, st.id);
  }
  setStatus('');
  toast('전체 업데이트 완료');
}

function setStatus(msg) {
  document.getElementById('refresh-status').textContent = msg;
}

function updateLastUpdated() {
  let latest = null;
  db.sectors.forEach(s => s.stocks.forEach(st => {
    if (st.pd?.updatedAt) {
      if (!latest || st.pd.updatedAt > latest) latest = st.pd.updatedAt;
    }
  }));
  document.getElementById('last-updated').textContent = '업데이트: ' + fmtTime(latest);
}

// ═══════════════════════════════════════════
//  ADD / DELETE
// ═══════════════════════════════════════════
function addSector() {
  const name = prompt('섹터 이름을 입력하세요:');
  if (!name?.trim()) return;
  const sec = { id: uid(), name: name.trim(), collapsed: false, stocks: [] };
  db.sectors.push(sec);
  save();
  render();
  toast(`섹터 "${sec.name}" 추가됨`);
}

function deleteSector(sectorId) {
  const sec = db.sectors.find(s => s.id === sectorId);
  if (!confirm(`"${sec?.name}" 섹터를 삭제하시겠습니까?`)) return;
  db.sectors = db.sectors.filter(s => s.id !== sectorId);
  save(); render();
}

function toggleAddForm(sectorId) {
  const el = document.getElementById('addform-' + sectorId);
  if (!el) return;
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'block';
  if (!visible) document.getElementById('code-' + sectorId)?.focus();
}

async function addStock(sectorId) {
  const codeEl = document.getElementById('code-' + sectorId);
  const mktEl  = document.getElementById('mkt-'  + sectorId);
  const statusEl = document.getElementById('add-status-' + sectorId);
  const code = codeEl.value.trim();
  const market = mktEl.value;
  if (!code) return;

  statusEl.textContent = '🔄 로딩 중... (최대 20초 소요)';
  try {
    const pd = await loadStockData(code, market);
    const sec = db.sectors.find(s => s.id === sectorId);
    // 종목명: Yahoo에서 받아온 이름 우선, 없으면 코드로 표시
    const name = pd.stockName || code.toUpperCase();
    const st = { id: uid(), code: code.toUpperCase(), market, name, features: '', issues: '', pd };

    sec.stocks.push(st);
    save();

    const tbody = document.getElementById('tbody-' + sectorId);
    const emptyRow = tbody?.querySelector('.empty-row');
    if (emptyRow) emptyRow.remove();
    tbody?.appendChild(buildRow(sectorId, st));

    // update badge
    const panel = document.querySelector(`.sector-panel[data-id="${sectorId}"]`);
    const badge = panel?.querySelector('.badge');
    if (badge) badge.textContent = sec.stocks.length + '종목';

    codeEl.value = '';
    statusEl.textContent = '';
    toast(`${st.name} 추가됨`);
  } catch (e) {
    statusEl.textContent = '❌ ' + (e.message || '로드 실패 — 코드/시장 구분을 확인하세요');
    toast('추가 실패: ' + code, false);
  }
}

function changeMarket(sectorId, stockId, newMarket) {
  const sec = db.sectors.find(s => s.id === sectorId);
  const st  = sec?.stocks.find(s => s.id === stockId);
  if (!st || st.market === newMarket) return;
  st.market = newMarket;
  st.pd = null;  // 이전 가격 데이터 초기화
  save();
  // select 색상만 업데이트 (전체 re-render 대신)
  const sel = document.querySelector(`#row-${st.id} .mkt-inline-select`);
  if (sel) {
    sel.className = `mkt-inline-select mkt-${newMarket}`;
  }
  refreshStock(sectorId, stockId);
}

function deleteStock(sectorId, stockId) {
  const sec = db.sectors.find(s => s.id === sectorId);
  const st  = sec?.stocks.find(s => s.id === stockId);
  if (!confirm(`"${st?.name}" 종목을 삭제하시겠습니까?`)) return;
  sec.stocks = sec.stocks.filter(s => s.id !== stockId);
  save();
  const row = document.getElementById('row-' + stockId);
  row?.remove();
  const panel = document.querySelector(`.sector-panel[data-id="${sectorId}"]`);
  const badge = panel?.querySelector('.badge');
  if (badge) badge.textContent = sec.stocks.length + '종목';
  if (sec.stocks.length === 0) {
    const tbody = document.getElementById('tbody-' + sectorId);
    if (tbody) tbody.innerHTML = `<tr class="empty-row"><td colspan="18">종목을 추가해 주세요</td></tr>`;
  }
}

// ═══════════════════════════════════════════
//  COLLAPSE / RENAME
// ═══════════════════════════════════════════
function toggleCollapse(sectorId) {
  const sec = db.sectors.find(s => s.id === sectorId);
  if (!sec) return;
  sec.collapsed = !sec.collapsed;
  save(); render();
}

function renameSector(sectorId, el) {
  const sec = db.sectors.find(s => s.id === sectorId);
  if (!sec) return;
  const input = document.createElement('input');
  input.className = 'sector-name-input';
  input.value = sec.name;
  el.replaceWith(input);
  input.focus();
  const commit = () => {
    const v = input.value.trim();
    if (v) { sec.name = v; save(); }
    render();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = sec.name; input.blur(); } });
}

// ═══════════════════════════════════════════
//  INLINE STOCK FIELD EDIT (종목명, 코드 수정)
// ═══════════════════════════════════════════
function editStockField(el, sectorId, stockId, field) {
  if (el.querySelector('input')) return;
  const sec = db.sectors.find(s => s.id === sectorId);
  const st = sec?.stocks.find(s => s.id === stockId);
  if (!st) return;
  const input = document.createElement('input');
  input.className = 'inline-edit-input';
  input.value = st[field] || '';
  input.style.width = '130px';
  el.innerHTML = '';
  el.appendChild(input);
  input.focus(); input.select();
  const commit = () => {
    const val = input.value.trim();
    if (val) { st[field] = val; save(); }
    const row = document.getElementById('row-' + stockId);
    if (row) row.replaceWith(buildRow(sectorId, st));
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = st[field] || ''; input.blur(); }
  });
}

function editStockCode(el, sectorId, stockId) {
  if (el.querySelector('input')) return;
  const sec = db.sectors.find(s => s.id === sectorId);
  const st = sec?.stocks.find(s => s.id === stockId);
  if (!st) return;
  const input = document.createElement('input');
  input.className = 'inline-edit-input';
  input.value = st.code;
  input.style.cssText += 'width:80px;font-family:monospace;font-size:11px;color:var(--muted)';
  el.innerHTML = '';
  el.appendChild(input);
  input.focus(); input.select();
  const commit = () => {
    const val = input.value.trim().toUpperCase();
    if (val && val !== st.code) {
      st.code = val;
      st.pd = null;
      save();
      const row = document.getElementById('row-' + stockId);
      if (row) row.replaceWith(buildRow(sectorId, st));
      refreshStock(sectorId, stockId);
    } else {
      const row = document.getElementById('row-' + stockId);
      if (row) row.replaceWith(buildRow(sectorId, st));
    }
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') {
      const row = document.getElementById('row-' + stockId);
      if (row) row.replaceWith(buildRow(sectorId, st));
    }
  });
}

// ═══════════════════════════════════════════
//  ROW SORTABLE (섹터 내 종목 순서 변경)
// ═══════════════════════════════════════════
function initSortableRows(tbody, sec) {
  Sortable.create(tbody, {
    animation: 150,
    handle: '.row-drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    filter: '.empty-row',
    onEnd(evt) {
      if (evt.oldIndex === evt.newIndex) return;
      const moved = sec.stocks.splice(evt.oldIndex, 1)[0];
      sec.stocks.splice(evt.newIndex, 0, moved);
      save();
    }
  });
}

// ═══════════════════════════════════════════
//  DRAG & DROP (SortableJS)
// ═══════════════════════════════════════════
function initSortable(container) {
  Sortable.create(container, {
    animation: 180,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd(evt) {
      const moved = db.sectors.splice(evt.oldIndex, 1)[0];
      db.sectors.splice(evt.newIndex, 0, moved);
      save();
    }
  });
}

// ═══════════════════════════════════════════
//  KEYBOARD SHORTCUT: Enter to add stock
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('add-input')) {
    const sectorId = e.target.id.replace('code-', '');
    addStock(sectorId);
  }
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
load();
render();
</script>
</body>
</html>
